version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golang_backend
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=coffeeshop
      - REDIS_URL=redis:6379
      - REDIS_ADDR=redis:6379 
      - SERVER_PORT=8080 
      - JWT_SECRET=7x!A%D*F-JaNdRgUkXp2s5v8y/B?E(H+MbQeShVmYq3t6w9z$C&F)J@NcRfUjXn2r
      - JWT_EXPIRATION=24h
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/coffeeshop?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coffee_network

  postgres:
    image: postgres:15-alpine
    container_name: coffee_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coffeeshop
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coffee_network

  redis:
    image: redis:7-alpine
    container_name: coffee_redis

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coffee_network

volumes:
  postgres_data:

networks:
  coffee_network:
    driver: bridge