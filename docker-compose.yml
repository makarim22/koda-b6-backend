version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golang_backend
    ports:
      - "8081:8080"
    environment:
      # Database configuration - UPDATED to match Node.js setup
      - DB_HOST=backend-js-postgres-1
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=coffeeshop
      - DATABASE_URL=postgresql://postgres:password@backend-js-postgres-1:5432/coffeeshop?sslmode=disable
      
      # Redis configuration - UPDATED to match Node.js setup
      - REDIS_URL=redis://backend-js-redis-cache-1:6379
      - REDIS_ADDR=backend-js-redis-cache-1:6379
      
      # Server configuration
      - SERVER_PORT=8080
      - JWT_SECRET=7x!A%D*F-JaNdRgUkXp2s5v8y/B?E(H+MbQeShVmYq3t6w9z$C&F)J@NcRfUjXn2r
      - JWT_EXPIRATION=24h
    
    # Note: postgres and redis-cache are external services running in Node.js docker-compose
    # No depends_on needed since we're connecting to external network
    
    # UPDATED - use coffee-network to match Node.js
    networks:
      - coffee-network

  # Note: postgres dan redis-cache sudah ada di Node.js docker-compose
  # Jangan jalankan services ini di sini, hanya reference network-nya
  # Tapi jika Golang dijalankan standalone, uncomment di bawah:

  # postgres:
  #   image: postgres:15-alpine
